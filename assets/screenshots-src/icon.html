<!doctype html>
<html><head><meta charset="utf-8"><style>
  html, body { margin: 0; padding: 0; width: 256px; height: 256px; }
  body {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #60a5fa 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
    color: #fff; position: relative; overflow: hidden;
  }
  .star { position: absolute; top: 28px; right: 32px; font-size: 36px; color: #fef3c7; opacity: .92; }
  .x { font-size: 168px; font-weight: 800; letter-spacing: -8px; line-height: 1; transform: translate(-2px, -6px); text-shadow: 0 8px 22px rgba(0,0,0,.22); }
</style></head>
<body>
  <span class="star">✦</span>
  <span class="x">x</span>
</body></html>
