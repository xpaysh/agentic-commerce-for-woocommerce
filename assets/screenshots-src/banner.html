<!doctype html>
<html><head><meta charset="utf-8"><style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);
    color: #fff;
    display: flex; align-items: center;
    padding: 0 5%;
    overflow: hidden;
    position: relative;
  }
  .orb { position: absolute; border-radius: 50%; filter: blur(70px); opacity: .42; }
  .o1 { width: 60%; aspect-ratio: 1; background: #60a5fa; top: -30%; right: -10%; }
  .o2 { width: 40%; aspect-ratio: 1; background: #a78bfa; bottom: -40%; left: 20%; }
  .row { display: flex; align-items: center; gap: 5%; width: 100%; position: relative; z-index: 2; }
  .left { flex: 1.4; }
  .brand { font-size: 2.6vh; font-weight: 700; opacity: .92; margin-bottom: 1.2vh; letter-spacing: -.02em; }
  .brand::before { content: "✦"; color: #fde68a; margin-right: 0.4em; }
  h1 { font-size: 7.2vh; font-weight: 800; margin: 0 0 1.4vh; line-height: 1; letter-spacing: -0.03em; }
  h1 em { font-style: normal; background: linear-gradient(90deg, #fef3c7, #fde68a); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { font-size: 3.2vh; opacity: .88; line-height: 1.3; font-weight: 400; }
  .right { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1.2vh; }
  .pill { background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.20); border-radius: 2vh; padding: 1.5vh 1.6vh; backdrop-filter: blur(8px); }
  .pill-label { font-size: 1.6vh; opacity: .65; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4vh; }
  .pill-name { font-size: 2.6vh; font-weight: 600; }
</style></head>
<body>
  <div class="orb o1"></div><div class="orb o2"></div>
  <div class="row">
    <div class="left">
      <div class="brand">xpay for WooCommerce</div>
      <h1>Sell on <em>ChatGPT.</em><br>Get paid on <em>WooCommerce.</em></h1>
      <div class="sub">Your catalog inside ChatGPT, Claude, Gemini &amp; Perplexity — checkout still on your gateway.</div>
    </div>
    <div class="right">
      <div class="pill"><div class="pill-label">Discover</div><div class="pill-name">ChatGPT</div></div>
      <div class="pill"><div class="pill-label">Discover</div><div class="pill-name">Claude</div></div>
      <div class="pill"><div class="pill-label">Discover</div><div class="pill-name">Gemini</div></div>
      <div class="pill"><div class="pill-label">Discover</div><div class="pill-name">Perplexity</div></div>
    </div>
  </div>
</body></html>
